services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    working_dir: /workspace
    user: vscode
    environment:
      NPM_CONFIG_CACHE: /home/vscode/.npm
    volumes:
      - ..:/workspace
      - ${HOME}/.codex:/home/vscode/.codex
      - ${HOME}/.ssh:/home/vscode/.ssh:ro
      - ${HOME}/.gitconfig:/home/vscode/.gitconfig:ro
      - ${HOME}/.config:/mnt/host-config
      - /var/run/docker.sock:/var/run/docker.sock
      - devcontainer-npm-cache:/home/vscode/.npm
      - workspace-node-modules:/workspace/node_modules
      - agent-runner-node-modules:/workspace/container/agent-runner/node_modules

volumes:
  devcontainer-npm-cache:
  workspace-node-modules:
  agent-runner-node-modules:
