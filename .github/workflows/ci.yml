name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            container/agent-runner/package-lock.json
      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Agent runner install
        run: npm --prefix container/agent-runner ci

      - name: Agent runner build
        run: npm --prefix container/agent-runner run build

      - name: Agent runner tests
        run: npm --prefix container/agent-runner run test
